




- name: playbook 
  hosts: webapp
  become: yes
  tasks:
    - name: installing nginx
      ansible.builtin.package:
        name: nginx 
        state: present
      notify: restart nginx

    - name: installing git
      ansible.builtin.package:
        name: git 
        state: present
    

  handlers:
     - name: restart nginx
       ansible.builtin.service:
          name: nginx
          state: restarted
    

