- name: Demo on data types
  hosts: local
  connection: local
  vars:
   PROGRAM: "Devsecops with aws"
   DURATION: 140
   IS_LIVE: true
   DETAILS: 
    MONTHS: 4
    TRAINER: "Sivakumar Reddy"
    TOPICS:
     - Linux
     - Shell
     - Ansible
    tasks:
     - name: print variables
       ansible.builtin.debug:
          msg: 
            program: '{{ PROGRAM }}'
            Duration: '{{ DURATION }}'
            Is Live?: '{{ IS_LIVE }}'
            Details: '{{ DETAILS }'
            Topics: '{{ TOPICS }}'
      
    
  